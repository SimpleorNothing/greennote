<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenNote · 칠판 정리 노트</title>
<meta name="description" content="매일 칠판에 정리한 필기를 과목·날짜별로 모아 관리하는 노트">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --bg:#ffffff; --surface:#f6f7f9; --text:#1a1d21; --muted:#5b6470;
    --border:#e6e9ee; --brand:#1257d6;
    --del-hover-bg:#ffe1e1; --del-hover-fg:#c0392b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--bg);}
  body{
    font-family:'Pretendard',system-ui,-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color:var(--text); padding:56px 24px; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:980px;margin:0 auto;}

  header{margin-bottom:28px;}
  h1{font-size:30px;font-weight:800;letter-spacing:-.5px;margin:0 0 6px;}
  .sub{font-size:15px;color:var(--muted);margin:0;line-height:1.55;}

  .banner{margin-top:16px;display:none;background:#fff6e5;border:1.5px solid #f0d9a8;color:#8a6212;border-radius:12px;padding:11px 15px;font-size:13px;line-height:1.55;}
  .banner.show{display:block;}

  .stats{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap;}
  .stat{flex:1;min-width:120px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px 18px;}
  .stat .num{font-size:24px;font-weight:800;letter-spacing:-.5px;}
  .stat .lbl{font-size:13px;color:var(--muted);margin-top:2px;}

  .dropzone{margin-top:22px;border:1.5px dashed var(--border);border-radius:14px;padding:30px 22px;text-align:center;color:var(--muted);font-size:14px;cursor:pointer;transition:.15s;background:var(--bg);}
  .dropzone:hover{border-color:var(--brand);}
  .dropzone.is-over{border-color:var(--brand);background:rgba(18,87,214,.06);}
  .dropzone .big{font-size:15px;color:var(--text);font-weight:600;margin-bottom:4px;}
  .dropzone .ico{font-size:26px;display:block;margin-bottom:8px;opacity:.5;}

  .toolbar{display:flex;gap:12px;align-items:center;margin:34px 0 16px;flex-wrap:wrap;}
  .chips{display:flex;gap:7px;flex-wrap:wrap;flex:1;}
  .chip{border:1.5px solid var(--border);background:var(--surface);color:var(--muted);border-radius:999px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;transition:.12s;font-family:inherit;}
  .chip:hover{border-color:var(--brand);color:var(--brand);}
  .chip.active{background:var(--brand);border-color:var(--brand);color:#fff;}
  .search{border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;color:var(--text);min-width:160px;outline:none;background:var(--bg);}
  .search:focus{border-color:var(--brand);}

  .group{margin-bottom:34px;}
  .group-head{display:flex;align-items:baseline;gap:10px;margin:0 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .group-head h2{font-size:18px;font-weight:700;letter-spacing:-.3px;margin:0;}
  .group-head .count{font-size:13px;color:var(--muted);}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:.15s;cursor:pointer;position:relative;}
  .card:hover{border-color:var(--brand);box-shadow:0 4px 18px rgba(18,87,214,.10);}
  .card .thumb{width:100%;aspect-ratio:4/3;background:#dfe3ea center/cover no-repeat;display:block;}
  .card .thumb.skeleton{background:linear-gradient(100deg,#e9ecf1 30%,#f3f5f8 50%,#e9ecf1 70%);background-size:200% 100%;animation:sk 1.2s infinite;}
  @keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .card .body{padding:13px 14px 15px;}
  .badge{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;margin-bottom:7px;}
  .card h3{font-size:15px;font-weight:700;margin:0 0 3px;line-height:1.4;}
  .card .memo{font-size:12.5px;color:var(--muted);line-height:1.6;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
  .tag{font-size:11.5px;font-weight:600;color:var(--brand);background:rgba(18,87,214,.09);border-radius:999px;padding:2px 8px;}
  .field input[type=text]:disabled{background:var(--surface);color:var(--muted);cursor:default;}
  .tags-hint{font-size:12px;color:var(--muted);margin-top:5px;min-height:16px;display:flex;align-items:center;gap:5px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .tags-hint .spinner{width:11px;height:11px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
  .card .del{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:7px;border:none;background:rgba(255,255,255,.92);color:var(--muted);cursor:pointer;font-size:15px;line-height:1;opacity:0;transition:.12s;display:flex;align-items:center;justify-content:center;}
  .card:hover .del{opacity:1;}
  .card .del:hover{background:var(--del-hover-bg);color:var(--del-hover-fg);}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:54px 20px;border:1.5px dashed var(--border);border-radius:14px;line-height:1.7;}
  .empty .ico{font-size:34px;display:block;margin-bottom:10px;opacity:.45;}

  .overlay{position:fixed;inset:0;background:rgba(20,24,30,.55);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;padding:24px;z-index:50;}
  .overlay.show{display:flex;}
  .modal{background:var(--bg);border-radius:16px;max-width:440px;width:100%;padding:24px;box-shadow:0 24px 60px rgba(18,40,80,.28);max-height:90vh;overflow:auto;}
  .modal h2{font-size:19px;font-weight:800;letter-spacing:-.3px;margin:0 0 16px;}
  .modal .preview{width:100%;border-radius:12px;border:1.5px solid var(--border);margin-bottom:16px;display:block;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field input[type=text],.field input[type=date],.field textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;color:var(--text);outline:none;background:var(--bg);}
  .field input:focus,.field textarea:focus{border-color:var(--brand);}
  .field textarea{resize:vertical;min-height:64px;line-height:1.55;}
  .subj-pick{display:flex;flex-wrap:wrap;gap:7px;}
  .subj-pick .chip.active{box-shadow:0 0 0 2px rgba(18,87,214,.18);}
  .modal-actions{display:flex;gap:10px;margin-top:8px;}
  .btn{flex:1;border:none;border-radius:11px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;}
  .btn-primary{background:var(--brand);color:#fff;}
  .btn-primary:hover{background:#0f49b3;}
  .btn-primary:disabled{opacity:.5;cursor:default;}
  .btn-ghost{background:var(--surface);color:var(--muted);border:1.5px solid var(--border);}
  .btn-ghost:hover{border-color:var(--brand);color:var(--brand);}

  .light{position:fixed;inset:0;background:rgba(12,14,18,.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:60;padding:30px;}
  .light.show{display:flex;}
  .light img{max-width:92vw;max-height:74vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .light .meta{color:#fff;text-align:center;margin-top:16px;max-width:680px;}
  .light .meta .lb-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.18);}
  .light .meta h3{font-size:18px;font-weight:700;margin:10px 0 4px;}
  .light .meta p{font-size:13.5px;color:#cdd3dc;line-height:1.65;margin:0;white-space:pre-wrap;}
  .light .close{position:absolute;top:20px;right:22px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;opacity:.8;}
  .light .close:hover{opacity:1;}

  .footer-tools{display:flex;gap:10px;justify-content:center;margin-top:18px;}
  .link-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px;}
  .link-btn:hover{color:var(--brand);}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:90;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media(max-width:640px){ body{padding:36px 16px;} .grid{grid-template-columns:repeat(2,1fr);} h1{font-size:25px;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>📋 칠판 정리 노트 <span style="font-size:15px;font-weight:600;color:var(--muted);">GreenNote</span></h1>
    <p class="sub">매일 칠판에 정리한 필기를 사진으로 올려서 과목·날짜별로 모아두는 곳이에요.<br>사진을 끌어다 놓거나 눌러서 추가하면 됩니다.</p>
    <div class="banner" id="banner"></div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="dropzone" id="dropzone">
    <span class="ico">📷</span>
    <div class="big">사진을 여기로 끌어다 놓거나 눌러서 추가</div>
    <div>JPG · PNG · 여러 장도 한 번에 가능</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple hidden>

  <div class="toolbar">
    <div class="chips" id="filterChips"></div>
    <input class="search" id="searchInput" type="text" placeholder="제목·메모 검색">
  </div>

  <div id="content"></div>

  <div class="footer-tools">
    <button class="link-btn" id="exportBtn">백업 내보내기</button>
    <button class="link-btn" id="importBtn">백업 불러오기</button>
    <input type="file" id="importInput" accept="application/json" hidden>
  </div>
</div>

<div class="overlay" id="composeOverlay">
  <div class="modal">
    <h2 id="composeTitle">기록 추가</h2>
    <img class="preview" id="composePreview" alt="">
    <div class="field"><label>날짜</label><input type="date" id="fDate"></div>
    <div class="field"><label>과목</label><div class="subj-pick" id="subjPick"></div></div>
    <div class="field"><label>단원 / 제목 <span style="font-weight:400;">(선택)</span></label><input type="text" id="fTitle" placeholder="예) 신미양요 (1871)"></div>
    <div class="field"><label>메모 <span style="font-weight:400;">(선택)</span></label><textarea id="fMemo" placeholder="외울 포인트, 헷갈린 부분 등"></textarea></div>
    <div class="field">
      <label>해시태그 <span style="font-weight:400;">(AI 자동 생성 · 수정 가능)</span></label>
      <input type="text" id="fTags" placeholder="예) 시험범위 핵심정리 신미양요">
      <div class="tags-hint" id="tagsHint"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="composeCancel">취소</button>
      <button class="btn btn-primary" id="composeSave">저장</button>
    </div>
  </div>
</div>

<div class="light" id="lightbox">
  <button class="close" id="lightClose">×</button>
  <img id="lightImg" alt="">
  <div class="meta" id="lightMeta"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUBJECTS = {
  '국어':   {bg:'#fdecec', fg:'#b3261e'},
  '영어':   {bg:'#e8f0fe', fg:'#1257d6'},
  '수학':   {bg:'#e7f6ec', fg:'#1b7a3e'},
  '한국사': {bg:'#fbeede', fg:'#9a6212'},
  '사회':   {bg:'#f0ecfb', fg:'#6b3fb0'},
  '과학':   {bg:'#e6f4f6', fg:'#0d6e7a'},
  '기타':   {bg:'#eef1f5', fg:'#5b6470'},
};
const DAYS = ['일','월','화','수','목','금','토'];

/* ── 저장소: Cloudflare R2 (Worker API 경유) ──
   - GET    api/index        : 기록 목록(메타데이터) 조회
   - PUT    api/index        : 기록 목록 저장
   - GET    api/image/{id}   : 사진 조회
   - PUT    api/image/{id}   : 사진 업로드
   - DELETE api/image/{id}   : 사진 삭제
   - POST   api/tags         : 이미지 바이너리 → Claude Vision → 한국어 태그 배열
   사진은 R2 객체로, 목록은 index.json 으로 보관된다. */
const api = {
  base: 'api',
  async getIndex(){ const r=await fetch(`${this.base}/index`,{cache:'no-store'}); if(!r.ok) throw new Error('index'); return r.json(); },
  async putIndex(list){ const r=await fetch(`${this.base}/index`,{method:'PUT',headers:{'content-type':'application/json'},body:JSON.stringify(list)}); if(!r.ok) throw new Error('save'); },
  imgUrl(id){ return `${this.base}/image/${id}`; },
  async putImage(id,blob){ const r=await fetch(this.imgUrl(id),{method:'PUT',headers:{'content-type':'image/jpeg'},body:blob}); if(!r.ok) throw new Error('upload'); },
  async delImage(id){ await fetch(this.imgUrl(id),{method:'DELETE'}); },
};

let state = { entries:[], filter:'전체', query:'' };
let pendingQueue = [];
let pendingCurrent = null;
let previewURL = null;
let selectedSubject = '한국사';

function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseTags(s){ return (s||'').split(/[\s,，]+/).map(t=>t.replace(/^#+/,'').trim()).filter(Boolean); }
function fmtDate(s){ const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); return `${y}년 ${m}월 ${d}일 (${DAYS[dt.getDay()]})`; }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1900); }
function banner(msg){ const b=document.getElementById('banner'); if(msg){ b.textContent=msg; b.classList.add('show'); } else b.classList.remove('show'); }

// 태그 입력창 로딩 상태 토글
function setTagsLoading(on){
  const el=document.getElementById('fTags');
  const hint=document.getElementById('tagsHint');
  if(!el) return; // 방어: 요소 없으면 무시
  el.disabled=on;
  if(on){
    el.placeholder='AI가 분석 중이에요…';
    if(hint) hint.innerHTML='<span class="spinner"></span><span>칠판 내용을 읽는 중…</span>';
  } else {
    el.placeholder='예) 시험범위 핵심정리 신미양요';
    if(hint) hint.innerHTML='';
  }
}

// 압축된 이미지 Blob을 Worker에 보내 태그 배열을 받아옴
// ※ 이 함수는 절대 reject하지 않음 — 실패 시 [] 반환
async function analyzeTags(blob){
  console.log('[GreenNote] 태그 분석 시작 · blob size =', blob?.size, 'type =', blob?.type);
  try {
    console.log('[GreenNote] POST api/tags 요청 중…');
    const res = await fetch('api/tags', {
      method: 'POST',
      headers: { 'content-type': 'image/jpeg' },
      body: blob,
    });
    console.log('[GreenNote] /api/tags 응답 status =', res.status);
    if(!res.ok){
      console.warn('[GreenNote] /api/tags 실패 (' + res.status + ') — 태그 없이 계속');
      return [];
    }
    const d = await res.json();
    console.log('[GreenNote] 수신 태그 =', d.tags);
    return Array.isArray(d.tags) ? d.tags : [];
  } catch(e) {
    console.warn('[GreenNote] 태그 fetch 오류 (저장은 정상) :', e.message);
    return [];
  }
}

function compress(file, maxDim=1200, q=0.72){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url);
      let {width:w,height:h}=img;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      c.toBlob(b=> b?res(b):rej(new Error('blob')), 'image/jpeg', q);
    };
    img.onerror=rej; img.src=url;
  });
}
function blobToDataURL(blob){ return new Promise(res=>{ const fr=new FileReader(); fr.onload=()=>res(fr.result); fr.readAsDataURL(blob); }); }
function dataURLToBlob(d){ const [h,b]=d.split(','); const mime=(h.match(/:(.*?);/)||[])[1]||'image/jpeg'; const bin=atob(b); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return new Blob([u],{type:mime}); }

async function loadIndex(){
  try{ state.entries = await api.getIndex(); banner(''); }
  catch(e){ state.entries=[]; banner('⚠️ 저장소(R2)에 연결되지 않았어요. Cloudflare Pages에 배포하고 greennote 버킷을 바인딩하면 정상 동작합니다.'); }
}
async function saveIndex(){ await api.putIndex(state.entries); }

async function handleFiles(files){
  const imgs=[...files].filter(f=>f.type.startsWith('image/'));
  if(!imgs.length) return;
  toast(imgs.length>1?`${imgs.length}장 처리 중…`:'사진 처리 중…');
  for(const f of imgs){ try{ pendingQueue.push(await compress(f)); }catch(e){ console.error(e); } }
  showNextCompose();
}

function showNextCompose(){
  if(!pendingQueue.length){ pendingCurrent=null; return; }
  pendingCurrent=pendingQueue.shift();
  if(previewURL) URL.revokeObjectURL(previewURL);
  previewURL=URL.createObjectURL(pendingCurrent);
  selectedSubject='한국사';
  document.getElementById('composeTitle').textContent=pendingQueue.length?`기록 추가 (남은 사진 ${pendingQueue.length}장)`:'기록 추가';
  document.getElementById('composePreview').src=previewURL;
  document.getElementById('fDate').value=todayStr();
  document.getElementById('fTitle').value='';
  document.getElementById('fMemo').value='';
  document.getElementById('fTags').value='';
  document.getElementById('composeSave').disabled=false;
  renderSubjPick();
  document.getElementById('composeOverlay').classList.add('show');

  // Claude Vision 태그 자동 생성
  // analyzeTags는 항상 resolve되므로 .catch/.finally 불필요
  const capturedBlob = pendingCurrent;
  console.log('[GreenNote] showNextCompose: 태그 분석 시작 · blob size =', capturedBlob?.size);
  setTagsLoading(true);
  analyzeTags(capturedBlob).then(tags => {
    console.log('[GreenNote] showNextCompose: 태그 수신 =', tags, '/ 모달 유효?', pendingCurrent === capturedBlob);
    // 먼저 input 활성화한 뒤 value 설정 (disabled 상태에서 값 설정 시 브라우저별 렌더링 차이 회피)
    setTagsLoading(false);
    if(pendingCurrent === capturedBlob){ // 취소 눌렸으면 null이 되므로 비교
      document.getElementById('fTags').value = tags.join(' ');
    }
  });
}

async function saveCompose(){
  if(!pendingCurrent) return;
  const btn=document.getElementById('composeSave'); btn.disabled=true;
  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const entry={ id, date:document.getElementById('fDate').value||todayStr(), subject:selectedSubject,
    title:document.getElementById('fTitle').value.trim(), memo:document.getElementById('fMemo').value.trim(),
    tags:parseTags(document.getElementById('fTags').value), createdAt:Date.now() };
  try{
    await api.putImage(id, pendingCurrent);
    state.entries.push(entry);
    await saveIndex();
    toast('저장됐어요 ✓');
  }catch(e){ toast('저장 실패 😢 (저장소 연결 확인)'); btn.disabled=false; return; }
  pendingCurrent=null;
  document.getElementById('composeOverlay').classList.remove('show');
  render();
  if(pendingQueue.length) setTimeout(showNextCompose,180);
}

async function deleteEntry(id){
  if(!confirm('이 기록을 삭제할까요?')) return;
  state.entries=state.entries.filter(e=>e.id!==id);
  try{ await saveIndex(); await api.delImage(id); }catch(e){ toast('삭제 실패 😢'); return; }
  render(); toast('삭제됐어요');
}

function renderSubjPick(){
  const box=document.getElementById('subjPick');
  box.innerHTML=Object.keys(SUBJECTS).map(s=>{
    const c=SUBJECTS[s], active=s===selectedSubject;
    return `<button class="chip${active?' active':''}" data-subj="${s}" style="${active?`background:${c.bg};color:${c.fg};border-color:${c.bg};`:''}">${s}</button>`;
  }).join('');
  box.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ selectedSubject=b.dataset.subj; renderSubjPick(); });
}

function renderStats(){
  const total=state.entries.length;
  const now=new Date(), ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const month=state.entries.filter(e=>e.date.startsWith(ym)).length;
  const days=new Set(state.entries.map(e=>e.date)).size;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="num">${total}</div><div class="lbl">전체 기록</div></div>
    <div class="stat"><div class="num">${month}</div><div class="lbl">이번 달</div></div>
    <div class="stat"><div class="num">${days}</div><div class="lbl">공부한 날</div></div>`;
}

function renderFilters(){
  const used=[...new Set(state.entries.map(e=>e.subject))];
  const order=Object.keys(SUBJECTS).filter(s=>used.includes(s));
  document.getElementById('filterChips').innerHTML=['전체',...order].map(s=>
    `<button class="chip${state.filter===s?' active':''}" data-f="${s}">${s}</button>`).join('');
  document.querySelectorAll('#filterChips .chip').forEach(b=>b.onclick=()=>{ state.filter=b.dataset.f; render(); });
}

function renderContent(){
  const c=document.getElementById('content');
  let list=state.entries.slice();
  if(state.filter!=='전체') list=list.filter(e=>e.subject===state.filter);
  if(state.query){ const q=state.query.toLowerCase();
    list=list.filter(e=>(e.title||'').toLowerCase().includes(q)||(e.memo||'').toLowerCase().includes(q)||e.subject.toLowerCase().includes(q)||(e.tags||[]).some(t=>t.toLowerCase().includes(q))); }
  list.sort((a,b)=> a.date<b.date?1 : a.date>b.date?-1 : b.createdAt-a.createdAt);

  if(!list.length){
    c.innerHTML=state.entries.length
      ? `<div class="empty"><span class="ico">🔍</span>조건에 맞는 기록이 없어요.</div>`
      : `<div class="empty"><span class="ico">🗒️</span>아직 기록이 없어요.<br>위에서 칠판 사진을 추가해보세요!</div>`;
    return;
  }
  const groups={};
  list.forEach(e=>{ (groups[e.date]=groups[e.date]||[]).push(e); });
  c.innerHTML=Object.keys(groups).sort().reverse().map(date=>{
    const items=groups[date].map(e=>{
      const col=SUBJECTS[e.subject]||SUBJECTS['기타'];
      return `<div class="card" data-id="${e.id}">
        <button class="del" data-del="${e.id}" title="삭제">×</button>
        <div class="thumb skeleton" data-img="${e.id}"></div>
        <div class="body">
          <span class="badge" style="background:${col.bg};color:${col.fg}">${e.subject}</span>
          ${e.title?`<h3>${esc(e.title)}</h3>`:''}
          ${e.memo?`<p class="memo">${esc(e.memo)}</p>`:''}
          ${e.tags&&e.tags.length?`<div class="tags">${e.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join('')}</div>`:''}
        </div></div>`;
    }).join('');
    return `<section class="group">
      <div class="group-head"><h2>${fmtDate(date)}</h2><span class="count">${groups[date].length}개</span></div>
      <div class="grid">${items}</div></section>`;
  }).join('');

  c.querySelectorAll('.thumb[data-img]').forEach(el=>{
    const src=api.imgUrl(el.dataset.img), im=new Image();
    im.onload=()=>{ el.style.backgroundImage=`url(${src})`; el.classList.remove('skeleton'); };
    im.onerror=()=>el.classList.remove('skeleton');
    im.src=src;
  });
  c.querySelectorAll('.card').forEach(card=>{
    card.onclick=(ev)=>{ if(ev.target.dataset.del) return; openLight(card.dataset.id); };
  });
  c.querySelectorAll('[data-del]').forEach(b=>b.onclick=(ev)=>{ ev.stopPropagation(); deleteEntry(b.dataset.del); });
}

function render(){ renderStats(); renderFilters(); renderContent(); }

function openLight(id){
  const e=state.entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('lightImg').src=api.imgUrl(id);
  document.getElementById('lightMeta').innerHTML=
    `<span class="lb-badge">${e.subject}</span>
     <h3>${esc(e.title)||fmtDate(e.date)}</h3>
     <p>${e.title?fmtDate(e.date)+(e.memo?'\n\n'+esc(e.memo):''):esc(e.memo)}</p>
     ${e.tags&&e.tags.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:10px;">${e.tags.map(t=>`<span style="font-size:12px;font-weight:600;color:#a0b8e8;background:rgba(255,255,255,.13);border-radius:999px;padding:3px 10px;">#${esc(t)}</span>`).join('')}</div>`:''}`;
  document.getElementById('lightbox').classList.add('show');
}
function closeLight(){ document.getElementById('lightbox').classList.remove('show'); }

async function exportData(){
  toast('백업 만드는 중…');
  const images={};
  for(const e of state.entries){
    try{ const r=await fetch(api.imgUrl(e.id)); if(r.ok) images[e.id]=await blobToDataURL(await r.blob()); }catch(_){}
  }
  const blob=new Blob([JSON.stringify({version:1,index:state.entries,images})],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`greennote_backup_${todayStr()}.json`; a.click(); URL.revokeObjectURL(a.href);
  toast('백업 파일을 내려받았어요');
}
async function importData(file){
  try{
    const data=JSON.parse(await file.text());
    if(!data.index) throw 0;
    let added=0;
    for(const e of data.index){
      if(state.entries.some(x=>x.id===e.id)) continue;
      const img=data.images?.[e.id];
      if(img){ await api.putImage(e.id, dataURLToBlob(img)); }
      state.entries.push(e); added++;
    }
    await saveIndex(); render(); toast(`${added}개 기록을 불러왔어요`);
  }catch(e){ toast('불러오기 실패 (파일·연결 확인)'); }
}

const dz=document.getElementById('dropzone'), fi=document.getElementById('fileInput');
dz.onclick=()=>fi.click();
fi.onchange=()=>{ if(fi.files.length){ handleFiles(fi.files); fi.value=''; } };
['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('is-over');}));
['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('is-over');}));
dz.addEventListener('drop',e=>{ if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });

document.getElementById('composeSave').onclick=saveCompose;
document.getElementById('composeCancel').onclick=()=>{ pendingCurrent=null; pendingQueue=[]; setTagsLoading(false); document.getElementById('composeOverlay').classList.remove('show'); };
document.getElementById('searchInput').oninput=e=>{ state.query=e.target.value.trim(); renderContent(); };
document.getElementById('lightClose').onclick=closeLight;
document.getElementById('lightbox').onclick=e=>{ if(e.target.id==='lightbox') closeLight(); };
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeLight(); document.getElementById('composeOverlay').classList.remove('show'); } });
document.getElementById('exportBtn').onclick=exportData;
document.getElementById('importBtn').onclick=()=>document.getElementById('importInput').click();
document.getElementById('importInput').onchange=function(){ if(this.files[0]) importData(this.files[0]); this.value=''; };

(async()=>{ await loadIndex(); render(); })();
</script>
</body>
</html>
