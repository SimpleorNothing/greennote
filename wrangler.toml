name = "greennote"
compatibility_date = "2024-09-23"
main = "src/index.js"

# 정적 파일(화면)은 public/ 에서 서빙한다.
[assets]
directory = "./public"
binding = "ASSETS"

# R2 버킷을 Worker에 바인딩한다.
# binding = 코드에서 env.greennote 로 접근하는 이름
# bucket_name = 실제 R2 버킷 이름
[[r2_buckets]]
binding = "greennote"
bucket_name = "greennote"

# ── Claude Vision 태그 자동 생성 ──────────────────────────────────────────
# ANTHROPIC_API_KEY 는 wrangler.toml에 직접 쓰지 말고 Cloudflare Secret으로 관리한다.
# 설정 방법:
#   wrangler secret put ANTHROPIC_API_KEY
#   → 프롬프트에 API 키 붙여넣기 (Enter)
# 또는 Cloudflare 대시보드 → Workers & Pages → greennote
#   → Settings → Variables and Secrets → Add secret
# 키가 없으면 /api/tags 는 빈 태그를 반환하고 나머지 기능은 정상 동작한다.
